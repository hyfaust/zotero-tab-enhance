<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-feature-groups"></html:h2></label>
  <checkbox
    id="__addonRef__-pref-enable-vertical-tabs"
    data-l10n-id="pref-enable-vertical-tabs"
    preference="__prefsPrefix__.enableVerticalTabs"
  />
  <checkbox
    id="__addonRef__-pref-enable-horizontal-tab-enhance"
    data-l10n-id="pref-enable-horizontal-tab-enhance"
    preference="__prefsPrefix__.enableHorizontalTabEnhance"
  />
</groupbox>

<groupbox>
  <label><html:h2 data-l10n-id="pref-tab-display"></html:h2></label>
  <vbox>
    <html:label
      for="__addonRef__-pref-vertical-tab-title-mode"
      data-l10n-id="pref-vertical-tab-title-mode"
    ></html:label>
    <html:select id="__addonRef__-pref-vertical-tab-title-mode">
      <html:option
        value="title"
        data-l10n-id="pref-vertical-tab-title-mode-title"
      ></html:option>
      <html:option
        value="shortTitle"
        data-l10n-id="pref-vertical-tab-title-mode-short-title"
      ></html:option>
    </html:select>
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-vertical-tab-subtitle-mode"
      data-l10n-id="pref-vertical-tab-subtitle-mode"
    ></html:label>
    <html:select id="__addonRef__-pref-vertical-tab-subtitle-mode">
      <html:option
        value="source"
        data-l10n-id="pref-vertical-tab-subtitle-mode-source"
      ></html:option>
      <html:option
        value="creatorYear"
        data-l10n-id="pref-vertical-tab-subtitle-mode-creator-year"
      ></html:option>
      <html:option
        value="typeAndItem"
        data-l10n-id="pref-vertical-tab-subtitle-mode-type-and-item"
      ></html:option>
      <html:option
        value="none"
        data-l10n-id="pref-vertical-tab-subtitle-mode-none"
      ></html:option>
    </html:select>
  </vbox>
</groupbox>

<groupbox>
  <label><html:h2 data-l10n-id="pref-group-colors"></html:h2></label>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-1"
      data-l10n-id="pref-group-color-1"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-1" type="color" />
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-2"
      data-l10n-id="pref-group-color-2"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-2" type="color" />
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-3"
      data-l10n-id="pref-group-color-3"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-3" type="color" />
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-4"
      data-l10n-id="pref-group-color-4"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-4" type="color" />
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-5"
      data-l10n-id="pref-group-color-5"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-5" type="color" />
  </vbox>
  <vbox>
    <html:label
      for="__addonRef__-pref-group-color-6"
      data-l10n-id="pref-group-color-6"
    ></html:label>
    <html:input id="__addonRef__-pref-group-color-6" type="color" />
  </vbox>
</groupbox>

<groupbox>
  <label><html:h2 data-l10n-id="pref-context-menu-features"></html:h2></label>
  <checkbox
    id="__addonRef__-pref-enable-copy-reference"
    data-l10n-id="pref-enable-copy-reference"
    preference="__prefsPrefix__.enableCopyReference"
  />
  <checkbox
    id="__addonRef__-pref-enable-go-to-attachment"
    data-l10n-id="pref-enable-go-to-attachment"
    preference="__prefsPrefix__.enableGoToAttachment"
  />
  <checkbox
    id="__addonRef__-pref-enable-reload-tab"
    data-l10n-id="pref-enable-reload-tab"
    preference="__prefsPrefix__.enableReloadTab"
  />
</groupbox>

<groupbox>
  <label><html:h2 data-l10n-id="pref-data-reset"></html:h2></label>
  <html:button
    id="__addonRef__-pref-reset-plugin-data"
    data-l10n-id="pref-reset-plugin-data"
  ></html:button>
</groupbox>

<vbox>
  <html:hr
    style="
      margin: 6px 0;
      border: 0;
      border-top: 1px solid currentColor;
      opacity: 0.28;
    "
  />
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
